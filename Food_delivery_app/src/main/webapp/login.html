<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FoodoraX | Login</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap");

:root {
    --primary: #FF6B35;
    --secondary: #1E293B;
    --accent: #FFC107;
    --white: #FFFFFF;
    --text: #334155;
    --muted: #64748B;
    --shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    font-family: "Poppins", Arial, sans-serif;
    background:
        linear-gradient(135deg, rgba(30, 41, 59, 0.88), rgba(255, 107, 53, 0.78)),
        url("https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=1400&q=80");
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    color: var(--text);
}

.auth-wrapper {
    width: min(1080px, 100%);
    min-height: 590px;
    display: grid;
    grid-template-columns: 1fr 430px;
    background: rgba(255, 255, 255, 0.14);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.24);
    border-radius: 30px;
    overflow: hidden;
    box-shadow: var(--shadow);
}

.brand-panel {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px;
    color: white;
    background:
        linear-gradient(135deg, rgba(30, 41, 59, 0.58), rgba(255, 107, 53, 0.20)),
        url("https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=1000&q=80");
    background-size: cover;
    background-position: center;
}

.logo {
    font-size: 31px;
    font-weight: 800;
    color: white;
}

.logo span {
    color: var(--accent);
}

.brand-content h1 {
    font-size: clamp(34px, 5vw, 58px);
    line-height: 1.08;
    margin-bottom: 18px;
}

.brand-content p {
    max-width: 520px;
    line-height: 1.8;
    color: rgba(255, 255, 255, 0.9);
}

.brand-points {
    display: grid;
    gap: 14px;
    margin-top: 30px;
}

.brand-points div {
    width: fit-content;
    padding: 10px 16px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.18);
    border: 1px solid rgba(255, 255, 255, 0.24);
    font-weight: 700;
}

.auth-card {
    background: rgba(255, 255, 255, 0.97);
    padding: 36px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.auth-card h2 {
    color: var(--secondary);
    font-size: 30px;
    text-align: center;
    margin-bottom: 8px;
}

.subtitle {
    text-align: center;
    color: var(--muted);
    margin-bottom: 28px;
}

.form-group {
    margin-bottom: 18px;
}

label {
    display: block;
    color: var(--secondary);
    font-weight: 700;
    margin-bottom: 7px;
}

input {
    width: 100%;
    border: 1px solid #E2E8F0;
    outline: none;
    border-radius: 14px;
    padding: 13px 15px;
    font-family: inherit;
    font-size: 14px;
    background: var(--white);
    transition: 0.3s;
}

input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.14);
}

.submit-btn {
    width: 100%;
    border: none;
    cursor: pointer;
    margin-top: 6px;
    padding: 14px 20px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--primary), #FF8F3F);
    color: white;
    font-family: inherit;
    font-size: 16px;
    font-weight: 800;
    box-shadow: 0 12px 25px rgba(255, 107, 53, 0.28);
    transition: 0.3s;
}

.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 0 6px rgba(255, 107, 53, 0.14),
                0 15px 30px rgba(255, 107, 53, 0.35);
}

.switch-link {
    text-align: center;
    margin-top: 20px;
    color: var(--muted);
    font-size: 15px;
}

.switch-link a {
    color: var(--primary);
    font-weight: 800;
    text-decoration: none;
}

@media (max-width: 850px) {
    body {
        align-items: flex-start;
    }

    .auth-wrapper {
        grid-template-columns: 1fr;
        min-height: auto;
    }

    .brand-panel {
        min-height: 350px;
        padding: 34px;
    }

    .auth-card {
        padding: 32px 24px;
    }
}

@media (max-width: 520px) {
    body {
        padding: 14px;
    }

    .auth-wrapper {
        border-radius: 22px;
    }

    .brand-panel {
        display: flex;
        min-height: 320px;
        padding: 26px;
    }

    .logo {
        font-size: 26px;
    }

    .brand-content h1 {
        font-size: 30px;
    }

    .brand-content p {
        font-size: 14px;
        line-height: 1.7;
    }

    .brand-points {
        gap: 10px;
        margin-top: 20px;
    }

    .brand-points div {
        font-size: 13px;
        padding: 8px 12px;
    }

    .auth-card h2 {
        font-size: 26px;
    }
}
</style>
</head>

<body>

<div class="auth-wrapper">

    <section class="brand-panel">
        <div class="logo">
            🍔 Foodora<span>X</span>
        </div>

        <div class="brand-content">
            <h1>Welcome Back</h1>
            <p>
                Login to continue ordering fresh, hot and delicious meals from
                premium restaurants near you.
            </p>

            <div class="brand-points">
                <div>⚡ Fast Delivery</div>
                <div>🍽 Fresh Food</div>
                <div>🔒 Secure Login</div>
            </div>
        </div>
    </section>

    <section class="auth-card">

        <h2>Login</h2>
        <p class="subtitle">Continue to FoodoraX</p>

        <form action="callLoginServlet" method="post">

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="submit-btn">
                Login
            </button>

        </form>

        <p class="switch-link">
            Don't have an account?
            <a href="register.html">Register</a>
        </p>

        <p class="switch-link">
            <a href="callRestaurantServlet">Back to Restaurants</a>
        </p>

    </section>

</div>

</body>
</html>
